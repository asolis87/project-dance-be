services:
  postgres:
    image: postgres:16-alpine
    container_name: project-dance-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: dance
      POSTGRES_PASSWORD: dance_dev
      POSTGRES_DB: project_dance
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
